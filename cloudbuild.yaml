# Cloud Build configuration for GCP deployment
# Usage: gcloud builds submit --config cloudbuild.yaml .

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$BUILD_ID'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FINNHUB_API_KEY=$_NEXT_PUBLIC_FINNHUB_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL'
      - '--build-arg'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'
      - '--build-arg'
      - 'ADMIN_EMAIL=$_ADMIN_EMAIL'
      - '--build-arg'
      - 'RESEND_API_KEY=$_RESEND_API_KEY'
      - '.'

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$BUILD_ID'
      - '&&'
      - 'docker'
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$BUILD_ID'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '100'
      - '--min-instances'
      - '0'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--set-secrets'
      - 'NEXT_PUBLIC_FINNHUB_API_KEY=FINNHUB_API_KEY:latest'
    entrypoint: 'gcloud'

# Image build substitutions
substitutions:
  _REGION: 'us-central1'
  _REPO_NAME: 'legacy-website-repo'
  _IMAGE_NAME: 'legacy-website'
  _SERVICE_NAME: 'legacy-website-service'
  _NEXT_PUBLIC_FINNHUB_API_KEY: 'd7gceipr01qqb8rj4om0d7gceipr01qqb8rj4omg'
  _NEXT_PUBLIC_API_URL: 'https://legacy-backend-151726525663.europe-west1.run.app'
  _GEMINI_API_KEY: 'AIzaSyDxnv0ueIx2ITyn8lgMl80P4HnYh2NSmk0'
  _ADMIN_EMAIL: 'chalamcharlasuhas1980@gmail.com'
  _RESEND_API_KEY: 're_ZaDHjgSD_NUJKpLZWHaUNegJz76GFZTqV'

# Timeout for the build
timeout: '1800s'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
