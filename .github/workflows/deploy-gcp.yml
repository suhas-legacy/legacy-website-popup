name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: legacy-website-494205
  REGION: us-central1
  SERVICE_NAME: legacy-website-service
  REPO_NAME: legacy-website-repo
  IMAGE_NAME: legacy-website

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_FINNHUB_API_KEY=d7gceipr01qqb8rj4om0d7gceipr01qqb8rj4omg \
            --build-arg NEXT_PUBLIC_API_URL=https://legacy-backend-151726525663.europe-west1.run.app \
            --build-arg GEMINI_API_KEY=AIzaSyDxnv0ueIx2ITyn8lgMl80P4HnYh2NSmk0 \
            --build-arg ADMIN_EMAIL=chalamcharlasuhas1980@gmail.com \
            --build-arg RESEND_API_KEY=re_ZaDHjgSD_NUJKpLZWHaUNegJz76GFZTqV \
            .
          docker tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 100 \
            --min-instances 0 \
            --timeout 300 \
            --concurrency 80 \
            --set-env-vars NODE_ENV=production,NEXT_PUBLIC_SITE_URL=https://legacyglobalbank.com \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-env-vars NEXT_PUBLIC_FINNHUB_API_KEY=d7gceipr01qqb8rj4om0d7gceipr01qqb8rj4omg
