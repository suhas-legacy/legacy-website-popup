name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: legacy-website-494205
  REGION: us-central1
  SERVICE_NAME: legacy-website-service
  REPO_NAME: legacy-website-repo
  IMAGE_NAME: legacy-website
  IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image with BuildKit and cache
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --build-arg ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} \
            --build-arg RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --load \
            -t ${{ env.IMAGE_URI }}:${{ github.sha }} \
            -t ${{ env.IMAGE_URI }}:latest \
            .

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_URI }}:${{ github.sha }}
          docker push ${{ env.IMAGE_URI }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URI }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 100 \
            --min-instances 0 \
            --timeout 300 \
            --concurrency 80 \
            --set-env-vars NODE_ENV=production,NEXT_PUBLIC_SITE_URL=https://legacyglobalbank.com \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-env-vars FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}
